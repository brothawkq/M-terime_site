<!DOCTYPE html>
<html lang="tr">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="../public/css/index.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   <title>Yazı Ekle — Toprak Arda Duman</title>
</head>

<body>

   <div class="topbar">
      <div class="wrapper target">
         <div class="left">
            <a href="#" target="_blank"><i class="fa-brands fa-square-x-twitter"></i></a>
            <a href="https://www.instagram.com/toprakarda62?igsh=MWpqdGJwZDV3MHMydQ==" target="_blank"><i class="fa-brands fa-square-instagram"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-square-facebook"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-square-pinterest"></i></a>
         </div>
         <div class="center">
            <a href="../index.html">ANA SAYFA</a>
            <a href="./blog.html">BLOG</a>
            <a href="./contact.html">İLETİŞİM</a>
            <a href="./login.html">GİRİŞ</a>
         </div>
         <div class="right">
            <span>
               <img src="../public/img/user-1.png" alt="kullanıcı">
            </span>
         </div>
      </div>
   </div>

   <div class="add">
      <form id="postForm">
         <div class="text">
            <input type="text" id="title" placeholder="Başlık" required>
            <textarea id="content" placeholder="İçerik" required></textarea>
            <input type="text" id="author" placeholder="Yazar" required>
         </div>
         <div class="button">
            <label for="image">
               <i class="fa-solid fa-image"></i>
            </label>
            <input type="file" id="image" accept="image/*" style="display:none">
            <button type="submit">
               <i class="fa-solid fa-plus"></i>
            </button>
         </div>
      </form>
   </div>

   <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
      import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const firebaseConfig = {
         apiKey: "AIzaSyBk9mcH4cFoF5Er6zKB6oanooO6ZYT3_Vc",
         authDomain: "blog-5a0b5.firebaseapp.com",
         projectId: "blog-5a0b5",
         storageBucket: "blog-5a0b5.firebasestorage.app",
         messagingSenderId: "798568666109",
         appId: "1:798568666109:web:128224277ce71b4ab1bf94",
         measurementId: "G-H56W0VWLS9"
      };

      const app  = initializeApp(firebaseConfig);
      const db   = getFirestore(app);
      const auth = getAuth(app);

      onAuthStateChanged(auth, (user) => {
         if (!user) { window.location.href = "./login.html"; }
      });

      const form = document.getElementById("postForm");

      form.addEventListener("submit", async (e) => {
         e.preventDefault();
         const title     = document.getElementById("title").value;
         const content   = document.getElementById("content").value;
         const author    = document.getElementById("author").value;
         const imageFile = document.getElementById("image").files[0];

         let imageBase64 = "";
         if (imageFile) {
            const reader = new FileReader();
            reader.readAsDataURL(imageFile);
            await new Promise((resolve) => { reader.onload = () => { imageBase64 = reader.result; resolve(); }; });
         }

         try {
            await addDoc(collection(db, "posts"), {
               title, content, author,
               image: imageBase64,
               date: new Date().toLocaleDateString("tr-TR")
            });
            alert("Yazı eklendi!");
            form.reset();
            window.location.href = "../index.html";
         } catch (err) {
            console.error(err);
            alert("Hata: " + err.message);
         }
      });
   </script>

</body>
</html>
