<!DOCTYPE html>
<html lang="tr">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="../public/css/index.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous" referrerpolicy="no-referrer" />
   <title>Kayıt — Toprak Arda Duman</title>
</head>

<body>

   <div class="topbar">
      <div class="wrapper target">
         <div class="left">
            <a href="#" target="_blank"><i class="fa-brands fa-square-x-twitter"></i></a>
            <a href="https://www.instagram.com/toprakarda62?igsh=MWpqdGJwZDV3MHMydQ==" target="_blank"><i class="fa-brands fa-square-instagram"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-square-facebook"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-square-pinterest"></i></a>
         </div>
         <div class="center">
            <a href="../index.html">ANA SAYFA</a>
            <a href="./blog.html">BLOG</a>
            <a href="./contact.html">İLETİŞİM</a>
            <a href="./login.html">GİRİŞ</a>
         </div>
         <div class="right">
            <span>
               <img src="../public/img/user-1.png" alt="kullanıcı">
            </span>
            <div class="searchEngine" id="searchEngine">
               <input type="text" placeholder="Ara...">
               <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
            </div>
         </div>
      </div>
   </div>

   <div class="logReg">
      <img src="../public/img/register.jpg" alt="kayıt">

      <form id="registerForm">
         <div class="formGroup">
            <input type="email" id="email" required>
            <span>E-posta *</span>
         </div>
         <div class="formGroup">
            <input type="text" id="username" required>
            <span>Kullanıcı Adı *</span>
         </div>
         <div class="formGroup">
            <input type="password" id="password" required>
            <span>Şifre *</span>
         </div>
         <div class="btnGroup">
            <a href="./login.html">Hesabın var mı?</a>
            <button type="submit">Kayıt Ol</button>
         </div>
      </form>
   </div>

   <script src="../public/js/search.js"></script>
   <script src="../public/js/scroll.js"></script>

   <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
         apiKey: "AIzaSyBk9mcH4cFoF5Er6zKB6oanooO6ZYT3_Vc",
         authDomain: "blog-5a0b5.firebaseapp.com",
         projectId: "blog-5a0b5",
         storageBucket: "blog-5a0b5.firebasestorage.app",
         messagingSenderId: "798568666109",
         appId: "1:798568666109:web:128224277ce71b4ab1bf94",
         measurementId: "G-H56W0VWLS9"
      };

      const app  = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db   = getFirestore(app);

      document.getElementById("registerForm").addEventListener("submit", async (e) => {
         e.preventDefault();
         const email    = document.getElementById("email").value;
         const username = document.getElementById("username").value;
         const password = document.getElementById("password").value;

         try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(doc(db, "users", userCredential.user.uid), { username, email });
            window.location.href = "../index.html";
         } catch (err) {
            alert("Kayıt hatası: " + err.message);
         }
      });
   </script>

</body>
</html>
