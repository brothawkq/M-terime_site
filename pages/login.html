<!DOCTYPE html>
<html lang="tr">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="../public/css/index.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous" referrerpolicy="no-referrer" />
   <title>Giriş — Toprak Arda Duman</title>
</head>

<body>

   <div class="topbar">
      <div class="wrapper target">
         <div class="left">
            <a href="#" target="_blank"><i class="fa-brands fa-square-x-twitter"></i></a>
            <a href="https://www.instagram.com/toprakarda62?igsh=MWpqdGJwZDV3MHMydQ==" target="_blank"><i class="fa-brands fa-square-instagram"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-square-facebook"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-square-pinterest"></i></a>
         </div>
         <div class="center">
            <a href="../index.html">ANA SAYFA</a>
            <a href="./blog.html">BLOG</a>
            <a href="./contact.html">İLETİŞİM</a>
            <a href="./login.html">GİRİŞ</a>
         </div>
         <div class="right">
            <span>
               <img src="../public/img/user-1.png" alt="kullanıcı">
            </span>
            <div class="searchEngine" id="searchEngine">
               <input type="text" placeholder="Ara...">
               <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
            </div>
         </div>
      </div>
   </div>

   <div class="logReg">
      <img src="../public/img/login.jpg" alt="giriş">

      <form id="loginForm">

         <div class="formGroup">
            <input type="email" id="email" required>
            <span>E-posta *</span>
         </div>

         <div class="formGroup">
            <input type="password" id="password" required>
            <span>Şifre *</span>
         </div>

         <div class="btnGroup">
            <a href="#" id="forgotPassword">Şifremi Unuttum?</a>
            <button type="submit">Giriş Yap</button>
         </div>

      </form>
   </div>

   <script src="../public/js/search.js"></script>
   <script src="../public/js/scroll.js"></script>

   <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
         getAuth,
         signInWithEmailAndPassword,
         sendPasswordResetEmail
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const firebaseConfig = {
         apiKey: "AIzaSyBk9mcH4cFoF5Er6zKB6oanooO6ZYT3_Vc",
         authDomain: "blog-5a0b5.firebaseapp.com",
         projectId: "blog-5a0b5",
         storageBucket: "blog-5a0b5.firebasestorage.app",
         messagingSenderId: "798568666109",
         appId: "1:798568666109:web:128224277ce71b4ab1bf94",
         measurementId: "G-H56W0VWLS9"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // GİRİŞ
      document.getElementById("loginForm").addEventListener("submit", async (e) => {
         e.preventDefault();
         const email    = document.getElementById("email").value;
         const password = document.getElementById("password").value;

         try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "./admin.html";
         } catch (err) {
            alert("Giriş hatası: " + err.message);
         }
      });

      // ŞİFREMİ UNUTTUM
      document.getElementById("forgotPassword").addEventListener("click", async (e) => {
         e.preventDefault();
         const email = document.getElementById("email").value;

         if (!email) {
            alert("Lütfen önce e-posta adresinizi girin.");
            return;
         }

         try {
            await sendPasswordResetEmail(auth, email);
            alert("Şifre sıfırlama e-postası gönderildi! Gelen kutunuzu kontrol edin.");
         } catch (err) {
            alert("Hata: " + err.message);
         }
      });
   </script>

</body>
</html>
