<!-- FIREBASE — Son Yazılarımdan + Öne Çıkan + Profil -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window.addEventListener("DOMContentLoaded", async () => {

   const firebaseConfig = {
      apiKey: "AIzaSyBk9mcH4cFoF5Er6zKB6oanooO6ZYT3_Vc",
      authDomain: "blog-5a0b5.firebaseapp.com",
      projectId: "blog-5a0b5",
      storageBucket: "blog-5a0b5.firebasestorage.app",
      messagingSenderId: "798568666109",
      appId: "1:798568666109:web:128224277ce71b4ab1bf94",
      measurementId: "G-H56W0VWLS9"
   };

   const app = initializeApp(firebaseConfig);
   const db  = getFirestore(app);
   const grid = document.getElementById("latestPostsGrid");

   function parseTRDate(str) {
      if (!str) return new Date(0);
      const p = str.split(".");
      return p.length === 3 ? new Date(+p[2], +p[1] - 1, +p[0]) : new Date(0);
   }

   // PROFİL BİYOGRAFİSİ + İLGİ ALANLARI ──────────────────────────────
   function revealSections() {
      document.getElementById("heroContent").classList.add("loaded");
      document.getElementById("aboutSection").classList.add("loaded");
   }

   try {
      const profileSnap = await getDoc(doc(db, "settings", "profile"));
      if (profileSnap.exists()) {
         const p = profileSnap.data();
         if (p.heroPhotoUrl)  document.getElementById("heroAvatar").src = p.heroPhotoUrl;
         if (p.heroBgUrl)     document.getElementById("heroBg").src     = p.heroBgUrl;
         if (p.aboutPhotoUrl) document.getElementById("aboutPhoto").src  = p.aboutPhotoUrl;
         document.getElementById("heroName").textContent  = p.name  || "";
         document.getElementById("heroTitle").textContent = p.title || "";
         if (p.bio1) document.getElementById("bio1Text").textContent = p.bio1;
         if (p.bio2) document.getElementById("bio2Text").textContent = p.bio2;
         if (p.int1Icon)  document.getElementById("int1Icon").className  = "fa-solid " + p.int1Icon;
         if (p.int1Title) document.getElementById("int1Title").textContent = p.int1Title;
         if (p.int1Desc)  document.getElementById("int1Desc").textContent  = p.int1Desc;
         if (p.int2Icon)  document.getElementById("int2Icon").className  = "fa-solid " + p.int2Icon;
         if (p.int2Title) document.getElementById("int2Title").textContent = p.int2Title;
         if (p.int2Desc)  document.getElementById("int2Desc").textContent  = p.int2Desc;
         if (p.int3Icon)  document.getElementById("int3Icon").className  = "fa-solid " + p.int3Icon;
         if (p.int3Title) document.getElementById("int3Title").textContent = p.int3Title;
         if (p.int3Desc)  document.getElementById("int3Desc").textContent  = p.int3Desc;
         if (p.int4Icon)  document.getElementById("int4Icon").className  = "fa-solid " + p.int4Icon;
         if (p.int4Title) document.getElementById("int4Title").textContent = p.int4Title;
         if (p.int4Desc)  document.getElementById("int4Desc").textContent  = p.int4Desc;
      }
   } catch (_) {} finally {
      revealSections();
   }

   // YAZILAR ─────────────────────────────────────────────────────────
   try {
      const snapshot = await getDocs(collection(db, "posts"));

      if (snapshot.empty) {
         grid.innerHTML = "<p class='loading-text'>Henüz yazı yok.</p>";
         return;
      }

      const posts = [];
      snapshot.forEach(d => posts.push({ id: d.id, ...d.data() }));
      posts.sort((a, b) => parseTRDate(b.date) - parseTRDate(a.date));

      // Feature 5: ÖNE ÇIKAN YAZI ──────────────────────────────────
      const featuredPost = posts.find(p => p.featured);
      if (featuredPost) {
         const fCard = document.getElementById("featuredCard");
         fCard.style.cursor = "pointer";
         fCard.innerHTML = `
            ${featuredPost.image ? `<img src="${featuredPost.image}" alt="${featuredPost.title}">` : ""}
            <div class="featured-body">
               ${featuredPost.category ? `<span class="featured-cat">${featuredPost.category}</span>` : ""}
               <h2>${featuredPost.title}</h2>
               <p>${featuredPost.content.substring(0, 120)}...</p>
               <div class="featured-meta">
                  <span>${featuredPost.author}</span>
                  <span>${featuredPost.date}</span>
               </div>
               <span class="featured-read-btn">Okumaya Devam Et →</span>
            </div>
         `;
         fCard.addEventListener("click", () => {
            window.location.href = `pages/post.html?id=${featuredPost.id}`;
         });
         document.getElementById("featuredSection").style.display = "block";
      }

      // SON YAZILARIMDAN ────────────────────────────────────────────
      grid.innerHTML = "";
      posts.slice(0, 3).forEach(post => {
         const card = document.createElement("div");
         card.classList.add("latest-post-card", "target");
         card.style.cursor = "pointer";
         card.innerHTML = `
            <img src="${post.image || 'public/img/content-1.jpg'}" alt="${post.title}">
            <div class="lp-body">
               <h3>${post.title}</h3>
               <p class="lp-excerpt">${post.content.substring(0, 90)}...</p>
               <div class="lp-meta">
                  <span>${post.author}</span>
                  <span>${post.date}</span>
               </div>
            </div>
         `;
         card.addEventListener("click", () => {
            window.location.href = `pages/post.html?id=${post.id}`;
         });
         grid.appendChild(card);
      });

      // Dinamik kartlar için IntersectionObserver
      const obs = new IntersectionObserver((entries) => {
         entries.forEach(e => {
            if (e.isIntersecting) e.target.classList.add("active");
            else e.target.classList.remove("active");
         });
      }, { threshold: 0.1 });
      document.querySelectorAll(".latest-post-card.target").forEach(el => obs.observe(el));

   } catch (err) {
      console.error("FIREBASE HATA:", err);
      grid.innerHTML = "<p class='loading-text'>Yazılar yüklenemedi.</p>";
   }
});
</script>

</body>
